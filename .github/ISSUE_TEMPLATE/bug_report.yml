name: Bug report
description: Report a reproducible jinhua problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands and sanitized sample records when useful.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, host agent, and jinhua commit if known.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I removed secrets, private prompts, and sensitive project data.
          required: true
